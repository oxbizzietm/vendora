services:
  mysql:
    image: mysql:8.4
    container_name: vendora-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vendora
      MYSQL_ROOT_PASSWORD: vendora_root_password
    ports:
      - "3306:3306"
    volumes:
      - vendora_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pvendora_root_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  vendora_mysql_data:
